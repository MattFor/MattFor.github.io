<!DOCTYPE html>

<head>

    <title>Relaxy! - Changelog</title>
    <script>document.documentElement.classList.add('js');
    try
    {
        if (localStorage.getItem('theme') === 'light')
        {
            document.documentElement.classList.add('light-mode');
        }
    }
    catch (e)
    {
    }</script>
    <link crossorigin href="https://cdnjs.cloudflare.com" rel="preconnect">

    <meta content="https://www.relaxy.xyz/subpages/changelog.html" property="og:url">

    <meta content="Check out the changelog and see the latest changes for Relaxy!, the Multipurpose Discord Bot."
          property="og:description">

<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="topbar">
    <a class="brand" href="/">
        <img alt="" decoding="async" height="56" src="../resources/relaxy.png" width="56">
        <span>Relaxy!</span>
    </a>
    <nav aria-label="Pages" class="site-nav" id="topnav"></nav>
    <div class="topbar-end">
        <button aria-pressed="false" class="theme-button" id="themeButton" onclick="toggleTheme()" type="button">Light

        </button>

            <span></span><span></span><span></span>
        </button>
    </div>
</header>

<div aria-hidden="true" class="nav-drawer" id="navDrawer">

    </div>
</div>

<section class="hero">
    <p class="eyebrow">Development</p>
    <h1>Changelog</h1>
    <p class="tagline">Every advance in Relaxy!'ss development - latest news at the bottom.</p>
</section>

<main class="wrap" id="main">

    <section class="card reveal" id="changelog">

<div id="subpages-bar"></div>

</footer>

<script defer src="/js/main/subpagebar.js"></script>

<script defer src="/js/main/mobilenav.js"></script>
